<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10149/10149458.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --text-color: #ffffff;
            --accent-gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
        }

        .app-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .display-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .currency {
            font-size: 18px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .amount {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .input-group {
            position: relative;
        }

        #ai-command {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            min-height: 60px;
            max-height: 150px;
        }

        #ai-command:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .date-input-wrapper {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s;
        }

        .date-label {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }

        .date-input {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
            outline: none;
            color-scheme: dark;
            transition: border-color 0.2s;
        }

        .date-input:focus {
            border-color: var(--primary);
        }

        .detection-info {
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.3s;
        }

        .item-count {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        .item-details {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* Seção de Resumos Atualizada */
        .summary-section {
            margin-top: 5px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
        }

        .summary-title {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .month-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Essencial para o scroll do iPhone */
        }

        .month-chips::-webkit-scrollbar {
            display: none;
        }

        .month-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0; /* Impede os botões de esmagarem */
            transition: all 0.2s;
        }

        /* Estado Selecionado */
        .month-btn.selected {
            border-color: var(--primary);
            color: black;
            background: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .settings-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            font-size: 12px;
            color: #888;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-card input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #ccc;
            font-size: 12px;
            padding: 5px 0;
            outline: none;
        }

        .btn-add {
            background: var(--accent-gradient);
            border: none;
            border-radius: 18px;
            padding: 20px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s active, opacity 0.3s;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
            margin-top: auto;
            margin-bottom: 20px;
        }

        .btn-add:active {
            transform: scale(0.96);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .settings-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.5;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 20px;
        }

        .modal-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.3s;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .summary-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .summary-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .edit-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            padding: 12px 15px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .edit-input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }
        
        .modal-total-box {
            margin: 15px 0 25px 0;
            padding: 15px;
            background: rgba(0, 242, 255, 0.05);
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        
        .modal-total-label {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .modal-total-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .item-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-cancel, .btn-confirm {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-confirm {
            background: var(--primary);
            color: black;
        }

        .response-text-container {
            font-size: 15px;
            color: #fff;
            white-space: pre-wrap;
            line-height: 1.6;
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .empty-state {
            color: #ffaa00;
            font-weight: 600;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 170, 0, 0.1);
            border-radius: 8px;
            text-align: center;
        }

        #settings-menu {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>FINANCE PRO</h1>
            <div class="settings-toggle" id="toggle-settings">⚙️</div>
        </header>

        <div class="display-card">
            <div class="currency">VALOR TOTAL</div>
            <div class="amount" id="amount-preview">R$ 0,00</div>
        </div>

        <div class="input-group">
            <textarea id="ai-command" placeholder="Ex: Mercado 120" autocomplete="off" rows="1"></textarea>
            
            <div id="detection-info" class="detection-info">
                <div id="item-count" class="item-count">0 itens detectados</div>
                <div id="item-details" class="item-details"></div>
            </div>

            <div class="date-input-wrapper">
                <span class="date-label">Data Opcional:</span>
                <input type="date" id="expense-date" class="date-input">
            </div>
        </div>

        <div class="summary-section">
            <div class="summary-title">Resumo do Mês</div>
            <div class="month-chips">
                <button class="month-btn" data-month="atual">Atual</button>
                <button class="month-btn" data-month="jan">Jan</button>
                <button class="month-btn" data-month="fev">Fev</button>
                <button class="month-btn" data-month="mar">Mar</button>
                <button class="month-btn" data-month="abr">Abr</button>
                <button class="month-btn" data-month="mai">Mai</button>
                <button class="month-btn" data-month="jun">Jun</button>
                <button class="month-btn" data-month="jul">Jul</button>
                <button class="month-btn" data-month="ago">Ago</button>
                <button class="month-btn" data-month="set">Set</button>
                <button class="month-btn" data-month="out">Out</button>
                <button class="month-btn" data-month="nov">Nov</button>
                <button class="month-btn" data-month="dez">Dez</button>
            </div>
        </div>

        <div id="settings-menu" class="settings-card">
            <span>WEBHOOK URL (n8n)</span>
            <input type="text" id="webhook-url" placeholder="https://seu-n8n.com/webhook/financeirov4">
        </div>

        <button class="btn-add" id="btn-pre-submit">REGISTRAR AGORA</button>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-title">Confirmar Lançamento?</div>
            <ul class="summary-list" id="summary-list"></ul>
            <div class="modal-total-box">
                <div class="modal-total-label">Total Corrigido</div>
                <div class="modal-total-value" id="modal-total-value">R$ 0,00</div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel">VOLTAR</button>
                <button class="btn-confirm" id="btn-confirm">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="response-modal">
        <div class="modal-card">
            <div class="modal-title" style="color: var(--primary);">✅ Relatório</div>
            <div class="response-text-container" id="response-text-content"></div>
            <button class="btn-confirm" id="btn-close-response" style="width: 100%;">FECHAR</button>
        </div>
    </div>

    <div class="toast" id="toast">Operação realizada!</div>

    <script>
        const input = document.getElementById('ai-command');
        const preview = document.getElementById('amount-preview');
        const toast = document.getElementById('toast');
        const detectionInfo = document.getElementById('detection-info');
        const webhookInput = document.getElementById('webhook-url');
        const itemCount = document.getElementById('item-count');
        const itemDetails = document.getElementById('item-details');
        const dateInput = document.getElementById('expense-date');
        
        const btnPreSubmit = document.getElementById('btn-pre-submit');
        const modal = document.getElementById('modal-overlay');
        const summaryList = document.getElementById('summary-list');
        const btnCancel = document.getElementById('btn-cancel');
        const btnConfirm = document.getElementById('btn-confirm');
        const settingsToggle = document.getElementById('toggle-settings');
        const settingsMenu = document.getElementById('settings-menu');
        const modalTotalValue = document.getElementById('modal-total-value');
        
        const responseModal = document.getElementById('response-modal');
        const responseTextContent = document.getElementById('response-text-content');
        const btnCloseResponse = document.getElementById('btn-close-response');

        const DEFAULT_WEBHOOK = "https://api.cinqfinance.work/webhook/financeirov4";
        const savedUrl = localStorage.getItem('n8n_webhook_url');
        webhookInput.value = savedUrl || DEFAULT_WEBHOOK;

        settingsToggle.addEventListener('click', () => {
            const isVisible = settingsMenu.style.display === 'flex';
            settingsMenu.style.display = isVisible ? 'none' : 'flex';
            settingsToggle.style.opacity = isVisible ? '0.5' : '1';
        });

        // Toggle dos Meses
        document.querySelectorAll('.month-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });

        function parseMessage(text) {
            const segments = text.split(/[,;\n]+/).map(s => s.trim()).filter(s => s.length > 0);
            let total = 0;
            let items = [];

            segments.forEach(seg => {
                const prices = seg.match(/\d+([.,]\d+)?/g) || [];
                const quantities = seg.match(/(\d+-|-\d+)/g) || [];
                
                let cleanPrices = [...prices];
                let itemQty = 1;

                if (quantities.length > 0) {
                    const qStr = quantities[0].replace('-', '');
                    const parsedQty = parseFloat(qStr);
                    itemQty = isNaN(parsedQty) ? 1 : parsedQty;
                    const qIndex = cleanPrices.indexOf(qStr);
                    if (qIndex > -1) cleanPrices.splice(qIndex, 1);
                }

                const parsedPrice = cleanPrices.length > 0 ? parseFloat(cleanPrices[0].replace(',', '.')) : 0;
                const itemPrice = isNaN(parsedPrice) ? 0 : parsedPrice;
                
                total += itemQty * itemPrice;
                items.push({ text: seg, price: itemPrice, qty: itemQty });
            });

            return { total, items, segments };
        }

        let timeoutId;
        input.addEventListener('input', (e) => {
            input.style.height = 'auto';
            input.style.height = (input.scrollHeight) + 'px';

            clearTimeout(timeoutId);
            
            timeoutId = setTimeout(() => {
                const { total, items } = parseMessage(e.target.value);
                
                if (items.length > 0 && total > 0) {
                    preview.innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                    itemCount.innerText = `${items.length} ${items.length === 1 ? 'item detectado' : 'itens detectados'}`;
                    
                    let detailsText = items.map(item => {
                        let q = item.qty > 1 ? ` (x${item.qty})` : "";
                        return `R$ ${item.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}${q}`;
                    }).join(' + ');
                    
                    itemDetails.innerText = detailsText;
                    detectionInfo.style.display = 'block';
                } else {
                    preview.innerText = 'R$ 0,00';
                    detectionInfo.style.display = 'none';
                }
            }, 300);
        });

        // Lógica Principal de Envio
        btnPreSubmit.addEventListener('click', () => {
            const rawText = input.value.trim();
            const selectedMonthBtns = document.querySelectorAll('.month-btn.selected');
            
            if (rawText.length === 0 && selectedMonthBtns.length === 0) {
                return alert('Digite um gasto ou selecione um mês de resumo!');
            }

            // Se for um Resumo (não digitou gasto, mas selecionou meses ou digitou a palavra resumo)
            if ((rawText.length === 0 && selectedMonthBtns.length > 0) || rawText.toLowerCase().includes('resumo')) {
                let command = rawText;
                
                if (rawText.length === 0) {
                    // Pega todos os meses selecionados e cria a frase
                    const months = Array.from(selectedMonthBtns).map(btn => btn.dataset.month).join(' ');
                    command = 'resumo ' + months;
                }
                
                sendToWebhook(command);
                return;
            }

            // Se for Lançamento de Gasto
            const { items } = parseMessage(input.value);
            summaryList.innerHTML = '';
            items.forEach((item, i) => {
                const li = document.createElement('li');
                li.className = 'summary-item';
                li.innerHTML = `
                    <div class="item-label">Item ${i+1}</div>
                    <input type="text" class="edit-input" value="${item.text}">
                `;
                summaryList.appendChild(li);
                li.querySelector('input').addEventListener('input', updateModalTotal);
            });

            updateModalTotal();
            modal.style.display = 'flex';
        });

        function updateModalTotal() {
            const inputs = document.querySelectorAll('.edit-input');
            let grandTotal = 0;
            inputs.forEach(inp => {
                const { total } = parseMessage(inp.value);
                grandTotal += total;
            });
            modalTotalValue.innerText = `R$ ${grandTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        btnCancel.addEventListener('click', () => modal.style.display = 'none');

        btnConfirm.addEventListener('click', () => {
            const inputs = document.querySelectorAll('.edit-input');
            const editedSegments = Array.from(inputs).map(inp => inp.value.trim());
            let finalMessage = editedSegments.join(', ');
            
            if (dateInput.value) {
                const [ano, mes, dia] = dateInput.value.split('-');
                finalMessage += ` (Data: ${dia}/${mes}/${ano})`;
            }

            sendToWebhook(finalMessage);
        });

        async function sendToWebhook(finalMessage) {
            const url = webhookInput.value.trim();

            if (!url) {
                modal.style.display = 'none';
                settingsMenu.style.display = 'flex';
                return alert('Configure a URL do Webhook primeiro!');
            }

            localStorage.setItem('n8n_webhook_url', url);
            
            btnPreSubmit.disabled = true;
            btnPreSubmit.innerText = 'CARREGANDO...';
            btnCancel.disabled = true;
            btnConfirm.disabled = true;
            btnConfirm.innerText = 'ENVIANDO...';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: finalMessage, origem: 'FinanceApp' })
                });

                if (response.ok) {
                    let responseData = await response.text(); 
                    
                    if (responseData.includes("Total Gastos: R$ 0,00") && !responseData.includes("📌")) {
                        responseData += "\n\n<div class='empty-state'>📭 Nenhum lançamento encontrado.</div>";
                    }
                    
                    modal.style.display = 'none';
                    responseTextContent.innerHTML = responseData;
                    responseModal.style.display = 'flex';

                    // Reseta tudo após o sucesso
                    input.value = '';
                    dateInput.value = '';
                    preview.innerText = 'R$ 0,00';
                    detectionInfo.style.display = 'none';
                    input.style.height = '60px';
                    document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('selected'));

                } else {
                    alert('Erro ao enviar. Verifique a URL do Webhook.');
                }
            } catch (err) {
                alert('Erro de conexão. Verifique se a URL está correta e permite CORS.');
            } finally {
                btnPreSubmit.disabled = false;
                btnPreSubmit.innerText = 'REGISTRAR AGORA';
                btnCancel.disabled = false;
                btnConfirm.disabled = false;
                btnConfirm.innerText = 'CONFIRMAR';
            }
        }

        btnCloseResponse.addEventListener('click', () => {
            responseModal.style.display = 'none';
        });
    </script>
</body>
</html>
